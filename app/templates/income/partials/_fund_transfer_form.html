<section
  class="rounded-lg border border-gray-200 bg-white p-4 dark:border-gray-700 dark:bg-gray-800"
>
  <h2 class="mb-4 text-base font-semibold text-gray-900 dark:text-white">
    Transferencia entre fondos
  </h2>

  <form
    method="post"
    action="{{ url_for('cash_flow.funds_settings', client_slug=business.client.slug, business_slug=business.slug) }}"
    class="grid grid-cols-1 gap-3 md:grid-cols-2"
    hx-post="{{ url_for('cash_flow.funds_settings', client_slug=business.client.slug, business_slug=business.slug) }}"
    hx-target="#funds-settings-content"
    hx-swap="outerHTML"
  >
    <input type="hidden" name="action" value="transfer" />

    <div>
      <label
        class="mb-2 block text-sm font-medium text-gray-900 dark:text-white"
        >Origen</label
      >
      <select
        name="source_subaccount_code"
        required
        class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
      >
        <option value="" selected disabled>Seleccionar origen</option>
        {% for row in fund_configs %}
          {% if row.is_active %}
            <option value="{{ row.subaccount_code }}">
              {{ row.display_name }} ({{ row.subaccount_code }})
            </option>
          {% endif %}
        {% endfor %}
      </select>
    </div>

    <div>
      <label
        class="mb-2 block text-sm font-medium text-gray-900 dark:text-white"
        >Destino</label
      >
      <select
        name="target_subaccount_code"
        required
        class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
      >
        <option value="" selected disabled>Seleccionar destino</option>
        {% for row in fund_configs %}
          {% if row.is_active %}
            <option value="{{ row.subaccount_code }}">
              {{ row.display_name }} ({{ row.subaccount_code }})
            </option>
          {% endif %}
        {% endfor %}
      </select>
    </div>

    <div>
      <label
        class="mb-2 block text-sm font-medium text-gray-900 dark:text-white"
        >Monto</label
      >
      <input
        type="number"
        name="transfer_amount"
        min="0.01"
        step="0.01"
        required
        class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
      />
    </div>

    <div>
      <label
        class="mb-2 block text-sm font-medium text-gray-900 dark:text-white"
        >Fecha/Hora (ISO opcional)</label
      >
      <input
        type="text"
        name="occurred_at"
        placeholder="YYYY-MM-DD o YYYY-MM-DDTHH:MM"
        class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
      />
    </div>

    <div class="md:col-span-2">
      <label
        class="mb-2 block text-sm font-medium text-gray-900 dark:text-white"
        >Descripción</label
      >
      <input
        type="text"
        name="transfer_description"
        placeholder="Transferencia interna"
        class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
      />
    </div>

    <div class="md:col-span-2">
      <label
        class="mb-2 block text-sm font-medium text-gray-900 dark:text-white"
        >Referencia documento (opcional)</label
      >
      <input
        type="text"
        name="supporting_document_ref"
        class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
      />
    </div>

    <div class="md:col-span-2">
      <button
        type="submit"
        class="inline-flex items-center rounded-lg bg-primary-700 px-4 py-2 text-sm font-medium text-white hover:bg-primary-800"
      >
        Registrar transferencia
      </button>
    </div>
  </form>
</section>

<div
  class="rounded-xl border border-gray-200 bg-white p-6 shadow-sm dark:border-gray-700 dark:bg-gray-800"
>
  <h2 class="text-lg font-semibold text-gray-900 dark:text-white">
    Crear fondo personalizado
  </h2>
  <form
    method="POST"
    action="{{ url_for('cash_flow.funds_settings', client_slug=business.client.slug, business_slug=business.slug) }}"
    class="mt-4 grid grid-cols-1 gap-4 md:grid-cols-2"
    hx-post="{{ url_for('cash_flow.funds_settings', client_slug=business.client.slug, business_slug=business.slug) }}"
    hx-target="#funds-settings-content"
    hx-swap="outerHTML"
  >
    <input type="hidden" name="action" value="create_custom" />

    <div>
      <label
        class="mb-1 block text-sm font-medium text-gray-900 dark:text-gray-100"
        >Código</label
      >
      <input
        type="text"
        name="new_subaccount_code"
        required
        placeholder="ej: promo_fund"
        class="w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
      />
    </div>

    <div>
      <label
        class="mb-1 block text-sm font-medium text-gray-900 dark:text-gray-100"
        >Nombre</label
      >
      <input
        type="text"
        name="new_display_name"
        required
        placeholder="Fondo Promoción"
        class="w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
      />
    </div>

    <div>
      <label
        class="mb-1 block text-sm font-medium text-gray-900 dark:text-gray-100"
        >Ubicación</label
      >
      <select
        name="new_location"
        class="w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
      >
        <option value="cash_box">cash_box</option>
        <option value="bank_account">bank_account</option>
      </select>
    </div>

    <div>
      <label
        class="mb-1 block text-sm font-medium text-gray-900 dark:text-gray-100"
        >Umbral por operación</label
      >
      <input
        type="number"
        step="0.01"
        min="0"
        name="new_threshold_max_per_operation"
        placeholder="Opcional"
        class="w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
      />
    </div>

    <div>
      <label
        class="mb-1 block text-sm font-medium text-gray-900 dark:text-gray-100"
        >Monto objetivo</label
      >
      <input
        type="number"
        step="0.01"
        min="0"
        name="new_target_balance"
        placeholder="Opcional"
        class="w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
      />
    </div>

    <div class="flex items-center gap-6 pt-6">
      <label
        class="inline-flex items-center gap-2 text-sm text-gray-900 dark:text-gray-100"
      >
        <input
          type="checkbox"
          name="new_is_active"
          checked
          class="h-4 w-4 rounded border-gray-300"
        />
        Activo
      </label>
      <label
        class="inline-flex items-center gap-2 text-sm text-gray-900 dark:text-gray-100"
      >
        <input
          type="checkbox"
          name="new_requires_documentation"
          class="h-4 w-4 rounded border-gray-300"
        />
        Requiere respaldo
      </label>
    </div>

    <div class="md:col-span-2 flex justify-end">
      <button
        type="submit"
        class="inline-flex items-center rounded-lg bg-emerald-700 px-4 py-2 text-sm font-medium text-white hover:bg-emerald-800"
      >
        Crear fondo
      </button>
    </div>
  </form>
</div>
